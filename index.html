<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Tayyorgarligi Dasturi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="app">
      <div class="container" id="setup-screen">
        <header>
          <h1>Test Tayyorgarligi</h1>
        </header>
        
        <div class="input-area" id="input-area">
          <h2>Test bo'limini tanlang</h2>
          <div id="range-container" class="range-grid">
            <!-- Range buttons will be generated here -->
            <div class="loader-container" id="loader-container">
              <div class="loader"></div>
              <p>Testlar yuklanmoqda...</p>
            </div>
          </div>
        </div>
      </div>

      <div class="container hidden" id="test-screen">
        <div class="test-header">
          <button id="back-home-btn" class="secondary-btn back-btn hidden">Ortga</button>
          <div id="range-display" class="range-badge">1 - 25 gacha savollar</div>
          <button id="finish-test-btn" class="primary-btn finish-btn">Testni yakunlash</button>
        </div>
        
        <div id="questions-list" class="questions-list">
          <!-- All 25 questions will be here -->
        </div>

        <div id="question-nav" class="question-nav">
          <!-- Bubbles 1-25 will be here -->
        </div>

        <div class="test-footer">
          <button id="finish-test-btn-bottom" class="primary-btn finish-btn">Testni yakunlash</button>
        </div>
      </div>

      <div class="container hidden" id="result-screen">
        <div class="result-card">
          <h2>Test yakunlandi!</h2>
          <div class="score-display">
            <span id="final-score">0</span> / <span id="total-questions">25</span>
          </div>
          <p id="result-message">Yaxshi natija!</p>
          <div class="result-actions">
            <button id="next-set-btn" class="primary-btn hidden">Keyingi 25 talik</button>
            <button id="restart-btn" class="secondary-btn">Boshiga qaytish</button>
          </div>
        </div>
      </div>
      <footer class="branding">
        by omankuloff tel+998933786886
      </footer>

      <!-- Exit Confirmation Modal -->
      <div id="exit-modal" class="modal-overlay hidden">
        <div class="modal-content">
          <h3>Test hali yakunlanmadi</h3>
          <p>Haqiqatan ham chiqib ketmoqchimisiz? Tanlang:</p>
          <div class="modal-actions">
            <button id="modal-continue-btn" class="secondary-btn">Davom etish</button>
            <button id="modal-exit-btn" class="danger-btn">Chiqish</button>
            <button id="modal-finish-btn" class="primary-btn finish-btn">Yakunlash</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
